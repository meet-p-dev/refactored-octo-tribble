<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{min-height:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;background:#f2f2f7}
#root{min-height:100vh;max-width:480px;margin:0 auto;position:relative}
input,select,button,textarea{font-family:inherit;font-size:16px;-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation}
input:focus,select:focus,textarea:focus{outline:none}
::-webkit-scrollbar{display:none}
input[type=color]{-webkit-appearance:none;border:none;cursor:pointer}
input[type=date]{color-scheme:auto}
select{-webkit-appearance:none}
@keyframes mtFade{from{opacity:0}to{opacity:1}}
@keyframes mtRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes mtPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes mtSheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes mtConfetti{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9}}
@keyframes mtShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
.mt-rise{animation:mtRise .42s cubic-bezier(.22,1,.36,1) both}
.mt-pop{animation:mtPop .34s cubic-bezier(.34,1.56,.64,1) both}
.mt-press{transition:transform .12s ease}
.mt-press:active{transform:scale(.94)}
.mt-hscroll{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 16px;margin:0 -16px}
.mt-hscroll>*{scroll-snap-align:start;flex-shrink:0}
</style>

function MiniChart({data,T,fmt:f}){
  const [sel,setSel]=useState(data.length-1);
  const cur=data[sel]||{label:"",income:0,spent:0};
  const max=Math.max(...data.flatMap(d=>[d.income,d.spent]),1);
  const W=300,H=140,bp=20,tp=8,aH=H-bp-tp,sw=W/data.length,bw=Math.min(sw*.28,10);
  return(
    <div>
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:T.txt}}>{cur.label}</span>
        <span style={{display:"flex",gap:12,fontSize:13,fontWeight:700}}>
          <span style={{color:T.cG}}>↑ {f(cur.income)}</span>
          <span style={{color:T.cR}}>↓ {f(cur.spent)}</span>
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H}>
        {[.33,.66,1].map(fr=><line key={fr} x1={0} y1={tp+(1-fr)*aH} x2={W} y2={tp+(1-fr)*aH} stroke={T.border} strokeWidth={.5}/>)}
        {data.map((d,i)=>{
          const cx=(i+.5)*sw,iH=(d.income/max)*aH,sH=(d.spent/max)*aH,on=i===sel;
          return(
            <g key={i} onClick={()=>setSel(i)} style={{cursor:"pointer"}}>
              {on&&<rect x={cx-sw/2+1} y={tp} width={sw-2} height={aH} fill={T.acc} opacity={.1} rx={4}/>}
              {iH>0&&<rect x={cx-bw-1} y={tp+aH-iH} width={bw} height={iH} fill={T.cG} rx={2} opacity={on?1:.5}/>}
              {sH>0&&<rect x={cx+1} y={tp+aH-sH} width={bw} height={sH} fill={T.cR} rx={2} opacity={on?1:.5}/>}
              <text x={cx} y={H-5} textAnchor="middle" fontSize={7.5} fill={on?T.txt:T.txt3} fontWeight={on?700:400}>{d.label}</text>
              <rect x={cx-sw/2} y={0} width={sw} height={H} fill="transparent"/>
            </g>
          );
        })}
        <rect x={W-54} y={tp+1} width={7} height={7} fill={T.cG} rx={1.5}/>
        <text x={W-44} y={tp+7.5} fontSize={7.5} fill={T.txt2}>Income</text>
        <rect x={W-54} y={tp+12} width={7} height={7} fill={T.cR} rx={1.5}/>
        <text x={W-44} y={tp+18.5} fontSize={7.5} fill={T.txt2}>Spent</text>
      </svg>
    </div>
  );
}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",flexShrink:0,borderBottom:`1px solid ${T.border}`}}>

      <div style={{position:"absolute",top:2,left:value?22:2,width:27,height:27,borderRadius:99,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.3)",transition:"left .25s cubic-bezier(.34,1.56,.64,1)"}}/>
    </div>

function AnimatedNumber({value,format,style}){
  const [d,setD]=useState(value);
  const ref=useRef(value);
  useEffect(()=>{
    const from=ref.current,to=value||0,start=performance.now();
    if(from===to){setD(to);return;}
    let raf;
    const tick=now=>{
      const t=Math.min((now-start)/700,1),e=1-Math.pow(1-t,3);
      setD(from+(to-from)*e);
      if(t<1)raf=requestAnimationFrame(tick);else{ref.current=to;setD(to);}
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[value]);
  return <span style={style}>{format?format(d):Math.round(d)}</span>;
}

function Ring({pct,size=66,stroke=7,color,track,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-Math.min(Math.max(pct||0,0),1));
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{transition:"stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)"}}/>
      </svg>
      {children!=null&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>}
    </div>
  );
}

function Confetti({show}){
  const pieces=useMemo(()=>Array.from({length:60},(_,i)=>({
    id:i,left:Math.random()*100,delay:Math.random()*.45,dur:1.7+Math.random()*1.5,
    color:["#ff453a","#30d158","#0a84ff","#ffd60a","#bf5af2","#ff9f0a"][i%6],
    w:6+Math.random()*7,rot:Math.random()*360
  })),[show]);
  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:998,pointerEvents:"none",overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",top:0,left:p.left+"%",width:p.w,height:p.w*.62,background:p.color,borderRadius:2,transform:`rotate(${p.rot}deg)`,animation:`mtConfetti ${p.dur}s ${p.delay}s ease forwards`}}/>
      ))}
    </div>
  );
}

function PinLock({T,mode,storedPin,onDone,onCancel}){
  const [stage,setStage]=useState(mode==="set"?"new":"enter");
  const [first,setFirst]=useState("");
  const [entry,setEntry]=useState("");
  const [shake,setShake]=useState(false);
  const [err,setErr]=useState("");
  const titles={enter:"Enter Passcode",new:"Create Passcode",confirm:"Confirm Passcode"};
  const subs={enter:"Unlock MoneyTrack",new:"Choose a 4-digit code",confirm:"Re-enter your code"};
  const fail=msg=>{setShake(true);setErr(msg||"");haptic([30,40,30]);setTimeout(()=>{setShake(false);setEntry("");setErr("");},520);};
  const commit=code=>{
    if(stage==="enter"){if(code===storedPin){haptic(14);onDone(code);}else fail("Wrong passcode");}
    else if(stage==="new"){setFirst(code);setEntry("");setStage("confirm");}
    else{if(code===first){haptic(14);onDone(code);}else{setStage("new");setFirst("");fail("Codes didn't match");}}
  };
  const press=n=>{if(entry.length>=4)return;haptic(8);const next=entry+n;setEntry(next);if(next.length===4)setTimeout(()=>commit(next),150);};
  const del=()=>{haptic(8);setEntry(e=>e.slice(0,-1));};
  const keys=["1","2","3","4","5","6","7","8","9","","0","del"];
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingBottom:"calc(env(safe-area-inset-bottom)+24px)",animation:"mtFade .25s ease"}}>
      <div style={{width:66,height:66,borderRadius:20,background:T.acc,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:18,boxShadow:`0 10px 34px ${T.acc}66`}} className="mt-pop">{I.lock("#fff",30)}</div>
      <div style={{fontWeight:700,fontSize:22,color:T.txt}}>{titles[stage]}</div>
      <div style={{fontSize:14,color:err?T.red:T.txt2,marginTop:5,height:18,fontWeight:err?600:400}}>{err||subs[stage]}</div>
      <div style={{display:"flex",gap:18,margin:"26px 0 34px",animation:shake?"mtShake .5s":"none"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:15,height:15,borderRadius:99,background:i<entry.length?(err?T.red:T.acc):"transparent",border:`2px solid ${i<entry.length?(err?T.red:T.acc):T.inpB}`,transition:"all .15s"}}/>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,76px)",gap:16}}>
        {keys.map((k,i)=>k===""?<div key={i}/>:k==="del"?(
          <button key={i} onClick={del} style={{height:76,borderRadius:99,background:"transparent",border:"none",color:T.txt,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.x(T.txt2)}</button>
        ):(
          <button key={i} onClick={()=>press(k)} className="mt-press" style={{height:76,borderRadius:99,background:T.card,border:`1px solid ${T.border}`,color:T.txt,fontSize:28,fontWeight:500,cursor:"pointer"}}>{k}</button>
        ))}
      </div>
      {onCancel&&<button onClick={onCancel} style={{marginTop:26,background:"none",border:"none",color:T.acc,fontSize:16,fontWeight:600,cursor:"pointer"}}>Cancel</button>}
    </div>
  );
}

function App(){
  const sysDark=window.matchMedia?.("(prefers-color-scheme:dark)").matches??false;
  const [accs,setAccs]           =useState([]);
  const [cats,setCats]           =useState([]);
  const [txs,setTxs]             =useState([]);
  const [goals,setGoals]         =useState([]);
  const [recurring,setRecurring] =useState([]);
  const [debts,setDebts]         =useState([]);
  const [dark,setDark]           =useState(()=>LS.g("mt-dark")??sysDark);
  const [tab,setTab]             =useState("home");
  const [modal,setModal]         =useState(null);
  const [editId,setEditId]       =useState(null);
  const [search,setSearch]       =useState("");
  const [fCat,setFCat]           =useState("");
  const [fAcc,setFAcc]           =useState("");
  const [drillCat,setDrillCat]   =useState(null);
  const [ready,setReady]         =useState(false);
  const [toast,setToast]         =useState(null);
  const [budgets,setBudgets]     =useState({});
  const [pin,setPin]             =useState(null);
  const [locked,setLocked]       =useState(false);
  const [pinFlow,setPinFlow]     =useState(null);
  const [hapticsOn,setHapticsOn] =useState(true);
  const [anaView,setAnaView]     =useState("spend");
  const [confetti,setConfetti]   =useState(false);
  // BUG FIX 4 — persisted to localStorage
  const [splitBannerSeen,setSplitBannerSeen]=useState(()=>LS.g("mt-split-banner")||false);
  const [dismissedNotifs,setDismissedNotifs]=useState([]);
  const [fabSide,setFabSide]     =useState("right");
  const [fabTop,setFabTop]       =useState(null);
  const [fabDrag,setFabDrag]     =useState(null);
  const [calMonth,setCalMonth]   =useState(()=>new Date().toISOString().slice(0,7));
  const [peopleView,setPeopleView]=useState("splits");
  const fileRef=useRef();
  const T=dark?DK:LT;

  useEffect(()=>{window.__mtHaptics=hapticsOn;},[hapticsOn]);
  const fireConfetti=()=>{setConfetti(true);haptic([12,40,12,40,18]);setTimeout(()=>setConfetti(false),2600);};

  const iTx={date:tod(),type:"expense",amount:"",merchant:"",category:"other",accountId:"",toAccountId:"",notes:"",isSplit:false,splitPeople:2,splitSettled:false};
  const iAcc={name:"",color:"#3b82f6",ib:""};
  const iCat={label:"",icon:"📦",color:"#9ca3af"};
  const iGoal={name:"",targetAmount:"",savedAmount:"",icon:"🎯",color:"#007aff"};
  const iRec={merchant:"",amount:"",category:"other",accountId:"",type:"expense",dayOfMonth:1,active:true,notes:""};
  const iDebt={personName:"",totalAmount:"",paidBack:"0",date:tod(),description:"",color:"#e11d48"};
  const iRepay={debtId:"",amount:"",date:tod(),accountId:"",notes:""};

  const [txForm,setTxForm]       =useState(iTx);
  const [accForm,setAccForm]     =useState(iAcc);
  const [catForm,setCatForm]     =useState(iCat);
  const [goalForm,setGoalForm]   =useState(iGoal);
  const [recForm,setRecForm]     =useState(iRec);
  const [debtForm,setDebtForm]   =useState(iDebt);
  const [repayForm,setRepayForm] =useState(iRepay);

  const showToast=(msg,ok=true,undo=null)=>{
    haptic(ok?12:[20,30,20]);
    setToast({msg,ok,undo});
    setTimeout(()=>setToast(null),undo?6000:2400);
  };

  useEffect(()=>{
    const a=LS.g("mt-accs")||DEFACCS;
    const c=LS.g("mt-cats")||CATS;
    const t=LS.g("mt-txs")||[];
    const g=LS.g("mt-goals")||[];
    const r=LS.g("mt-recurring")||[];
    const db=LS.g("mt-debts")||[];
    setAccs(a);setCats(c);setTxs(t);setGoals(g);setRecurring(r);setDebts(db);
    setBudgets(LS.g("mt-budgets")||{});
    setDismissedNotifs(LS.g("mt-dismissed-notifs")||[]);
    setFabSide(LS.g("mt-fab-side")||"right");
    setFabTop(LS.g("mt-fab-top"));
    const sp=LS.g("mt-pin");if(sp){setPin(sp);setLocked(true);}
    const hp=LS.g("mt-haptics");setHapticsOn(hp===null?true:hp);
    if(!LS.g("mt-accs"))LS.s("mt-accs",DEFACCS);
    if(!LS.g("mt-cats"))LS.s("mt-cats",CATS);
    setReady(true);
  },[]);

  const mkSet=(setState,key)=>v=>setState(prev=>{const next=typeof v==="function"?v(prev):v;LS.s(key,next);return next;});
  const sa=mkSet(setAccs,"mt-accs");
  const sc=mkSet(setCats,"mt-cats");
  const st=mkSet(setTxs,"mt-txs");
  const sg=mkSet(setGoals,"mt-goals");
  const sr=mkSet(setRecurring,"mt-recurring");
  const sd=mkSet(setDebts,"mt-debts");
  const sb=mkSet(setBudgets,"mt-budgets");
  const sdn=mkSet(setDismissedNotifs,"mt-dismissed-notifs");

  const onFabDown=e=>{
    e.preventDefault();
    const sx=e.clientX,sy=e.clientY;let moved=false;
    const move=ev=>{if(Math.abs(ev.clientX-sx)>6||Math.abs(ev.clientY-sy)>6)moved=true;if(moved)setFabDrag({x:ev.clientX,y:ev.clientY});};
    const up=ev=>{
      window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);
      setFabDrag(null);
      if(moved){
        const ns=ev.clientX<window.innerWidth/2?"left":"right";
        setFabSide(ns);LS.s("mt-fab-side",ns);
        const nt=Math.max(8,Math.min(window.innerHeight-70,ev.clientY-31));
        setFabTop(nt);LS.s("mt-fab-top",nt);
        haptic(12);
      }else openAddPrefill();
    };
    window.addEventListener("pointermove",move);window.addEventListener("pointerup",up);
  };

  const tgDk=()=>{const nd=!dark;setDark(nd);LS.s("mt-dark",nd);};
  const setHap=v=>{setHapticsOn(v);LS.s("mt-haptics",v);};
  const getCat=id=>cats.find(c=>c.id===id)||CATS.find(c=>c.id===id)||{icon:"📦",color:"#9ca3af",label:id||"Other"};

  const getBal=aid=>{
    const a=accs.find(x=>x.id===aid);if(!a)return 0;
    let b=parseFloat(a.ib)||0;
    txs.forEach(t=>{
      const v=parseFloat(t.amount)||0;
      if(t.type==="income"&&t.accountId===aid)b+=v;
      if(t.type==="expense"&&t.accountId===aid)b-=v;
      if(t.type==="transfer"&&t.accountId===aid)b-=v;
      if(t.type==="transfer"&&t.toAccountId===aid)b+=v;
    });
    return b;
  };

  const totBal=useMemo(()=>accs.reduce((s,a)=>s+getBal(a.id),0),[accs,txs]);
  const mLbl=new Date().toLocaleString("default",{month:"long"});
  const mSt=useMemo(()=>{
    const k=new Date().toISOString().slice(0,7);
    const m=txs.filter(t=>t.date.startsWith(k));
    return{
      inc:m.filter(t=>t.type==="income").reduce((s,t)=>s+parseFloat(t.amount),0),
      spt:m.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount)),0),
    };
  },[txs]);

  const chartD=useMemo(()=>{
    const now=new Date();
    return Array.from({length:12},(_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      return{
        label:d.toLocaleString("default",{month:"short"}),
        income:txs.filter(t=>t.type==="income"&&t.date.startsWith(k)).reduce((s,t)=>s+parseFloat(t.amount),0),
        spent:txs.filter(t=>t.type==="expense"&&t.date.startsWith(k)).reduce((s,t)=>s+(t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount)),0),
      };
    });
  },[txs]);

  const catD=useMemo(()=>{
    const map={};
    txs.filter(t=>t.type==="expense").forEach(t=>{
      const c=t.category||"other";
      if(!map[c])map[c]={total:0,merchants:{}};
      const a=t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount);
      map[c].total+=a;
      const m=t.merchant||"Unknown";
      map[c].merchants[m]=(map[c].merchants[m]||0)+a;
    });
    return Object.entries(map).sort(([,a],[,b])=>b.total-a.total).map(([id,v])=>({id,...v,...getCat(id)}));
  },[txs,cats]);

  const filtTxs=useMemo(()=>
    [...txs].sort((a,b)=>b.date.localeCompare(a.date)).filter(t=>{
      if(search&&!t.merchant?.toLowerCase().includes(search.toLowerCase()))return false;
      if(fCat&&t.category!==fCat)return false;
      if(fAcc&&t.accountId!==fAcc)return false;
      return true;
    }),[txs,search,fCat,fAcc]);

  const recTxs=useMemo(()=>[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8),[txs]);
  const pendingSplits=useMemo(()=>txs.filter(t=>t.isSplit&&!t.splitSettled&&t.type==="expense"),[txs]);
  const totalOwed=useMemo(()=>pendingSplits.reduce((s,t)=>{const f=parseFloat(t.amount)||0;return s+(f-f/t.splitPeople);},0),[pendingSplits]);
  const recurringDue=useMemo(()=>{const dom=new Date().getDate();return recurring.filter(r=>r.active&&r.dayOfMonth>=dom&&r.dayOfMonth<=dom+3);},[recurring]);
  const activeDebts=useMemo(()=>debts.filter(d=>!d.settled),[debts]);
  const settledDebts=useMemo(()=>debts.filter(d=>d.settled),[debts]);
  const totalDebt=useMemo(()=>activeDebts.reduce((s,d)=>s+(d.totalAmount-d.paidBack),0),[activeDebts]);

  const now0=new Date();
  const monthKey=now0.toISOString().slice(0,7);
  const daysInMonth=new Date(now0.getFullYear(),now0.getMonth()+1,0).getDate();
  const dayOfMonth=now0.getDate();
  const daysLeft=Math.max(daysInMonth-dayOfMonth+1,1);

  const monthCatSpent=useMemo(()=>{
    const m={};
    txs.filter(t=>t.type==="expense"&&t.date.startsWith(monthKey)).forEach(t=>{
      const a=t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount);
      m[t.category||"other"]=(m[t.category||"other"]||0)+a;
    });
    return m;
  },[txs]);

  const budgetData=useMemo(()=>cats
    .map(c=>({...c,limit:parseFloat(budgets[c.id])||0,spent:monthCatSpent[c.id]||0}))
    .filter(b=>b.limit>0)
    .map(b=>({...b,pct:b.spent/b.limit}))
    .sort((a,b)=>b.pct-a.pct)
  ,[cats,budgets,monthCatSpent]);
  const totalBudget=useMemo(()=>budgetData.reduce((s,b)=>s+b.limit,0),[budgetData]);
  const totalBudgetSpent=useMemo(()=>budgetData.reduce((s,b)=>s+b.spent,0),[budgetData]);
  const overBudget=useMemo(()=>budgetData.filter(b=>b.pct>1),[budgetData]);
  const safeToday=useMemo(()=>{
    if(totalBudget>0)return Math.max((totalBudget-totalBudgetSpent)/daysLeft,0);
    if(mSt.inc>0)return Math.max((mSt.inc-mSt.spt)/daysLeft,0);
    return 0;
  },[totalBudget,totalBudgetSpent,mSt,daysLeft]);

  const reachedGoals=useMemo(()=>goals.filter(g=>parseFloat(g.targetAmount)>0&&parseFloat(g.savedAmount)>=parseFloat(g.targetAmount)),[goals]);
  const notifs=useMemo(()=>{
    const a=[];
    recurringDue.forEach(r=>a.push({k:"rec-"+r.id,icon:"💳",tone:"blue",title:r.merchant+" due soon",sub:"Recurring · day "+r.dayOfMonth,tab:"splits",pv:"recurring"}));
    overBudget.forEach(b=>a.push({k:"ob-"+b.label,icon:"⚠️",tone:"red",title:b.label+" over budget",sub:Math.round(b.pct*100)+"% used",tab:"stats",ana:"budget"}));
    pendingSplits.forEach(t=>a.push({k:"ps-"+t.id,icon:"🧾",tone:"green",title:t.merchant,sub:"Split not settled",tab:"splits",pv:"splits"}));
    reachedGoals.forEach(g=>a.push({k:"g-"+g.id,icon:"🎉",tone:"green",title:g.name+" reached!",sub:"Savings goal complete",tab:"goals"}));
    activeDebts.slice(0,2).forEach(d=>a.push({k:"debt-"+d.id,icon:"💸",tone:"red",title:`Owe ${d.personName} ${fmt(d.totalAmount-d.paidBack)}`,sub:"Tap to log repayment",tab:"splits",pv:"debts"}));
    return a.filter(n=>!dismissedNotifs.includes(n.k));
  },[recurringDue,overBudget,pendingSplits,reachedGoals,activeDebts,dismissedNotifs]);

  const insights=useMemo(()=>{
    const list=[];
    const dailyAvg=mSt.spt/Math.max(dayOfMonth,1),projected=dailyAvg*daysInMonth;
    const lm=new Date(now0.getFullYear(),now0.getMonth()-1,1);
    const lmKey=`${lm.getFullYear()}-${String(lm.getMonth()+1).padStart(2,"0")}`;
    const lmSpent=txs.filter(t=>t.type==="expense"&&t.date.startsWith(lmKey)).reduce((s,t)=>s+(t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount)),0);
    const expTx=txs.filter(t=>t.type==="expense"&&t.date.startsWith(monthKey));
    if(mSt.inc>0){const r=Math.round((mSt.inc-mSt.spt)/mSt.inc*100);list.push({icon:"💎",label:"Savings rate",value:r+"%",sub:r>=20?"Great!":"Aim for 20%+",tone:r>=20?"green":r>=0?"blue":"red"});}
    if(mSt.spt>0)list.push({icon:"📈",label:"Projected spend",value:fmt(projected),sub:"by month-end",tone:"blue"});
    if(lmSpent>0){const diff=Math.round((mSt.spt-lmSpent)/lmSpent*100);list.push({icon:diff<=0?"🎉":"⚠️",label:"vs last month",value:(diff>0?"+":"")+diff+"%",sub:diff<=0?"less spending":"more spending",tone:diff<=0?"green":"red"});}
    list.push({icon:"📅",label:"Daily average",value:fmt(dailyAvg),sub:`over ${dayOfMonth} days`,tone:"blue"});
    if(expTx.length){
      const big=expTx.reduce((a,b)=>parseFloat(b.amount)>parseFloat(a.amount)?b:a);
      list.push({icon:"🔥",label:"Biggest expense",value:fmt(parseFloat(big.amount)),sub:big.merchant||"—",tone:"red"});
    }
    return list;
  },[txs,mSt,dayOfMonth,daysInMonth]);

  const calData=useMemo(()=>{
    const m={};
    txs.filter(t=>t.type==="expense"&&t.date.startsWith(calMonth)).forEach(t=>{
      const a=t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount);
      m[t.date]=(m[t.date]||0)+a;
    });
    return m;
  },[txs,calMonth]);

  const closeM=()=>{setModal(null);setEditId(null);setTxForm(iTx);setAccForm(iAcc);setGoalForm(iGoal);setRecForm(iRec);setDebtForm(iDebt);setRepayForm(iRepay);setCatForm(iCat);};

  // BUG FIX 1: _settleIds only marks splits settled when user actually saves
  const doAddTx=()=>{
    if(!txForm.amount||!txForm.accountId)return;
    const {_settleIds,...cleanForm}=txForm;
    const settleIds=_settleIds||[];
    const tx={...cleanForm,id:editId||uid(),amount:parseFloat(txForm.amount),splitPeople:txForm.isSplit?parseInt(txForm.splitPeople)||2:1};
    const base=editId?txs.map(t=>t.id===editId?tx:t):[tx,...txs];
    const newTxs=settleIds.length?base.map(t=>settleIds.includes(t.id)?{...t,splitSettled:true}:t):base;
    st(newTxs);
    if(tx.isSplit){setSplitBannerSeen(false);LS.s("mt-split-banner",false);}
    try{localStorage.setItem("mt-last-account",tx.accountId);localStorage.setItem("mt-last-category",tx.category);}catch{}
    showToast(editId?"Transaction updated":"Transaction added",true,()=>st(prev=>prev.filter(t=>t.id!==tx.id)));
    closeM();
  };

  // BUG FIX 2: always use doDeleteTx for undo support
  const doDeleteTx=id=>{
    const old=txs.find(t=>t.id===id);if(!old)return;
    st(txs.filter(t=>t.id!==id));
    showToast("Transaction deleted",true,()=>st(prev=>[old,...prev]));
  };

  const doEditTx=t=>{setTxForm({...iTx,...t});setEditId(t.id);setModal("tx");};
  const openAddPrefill=()=>{
    const la=localStorage.getItem("mt-last-account");
    const lc=localStorage.getItem("mt-last-category");
    setTxForm({...iTx,accountId:la||accs[0]?.id||"",category:lc||"other"});
    setEditId(null);setModal("tx");
  };

  const doAddAcc=()=>{
    if(!accForm.name)return;
    const a={id:editId||uid(),...accForm,ib:parseFloat(accForm.ib)||0};
    sa(editId?accs.map(x=>x.id===editId?{...x,...a}:x):[...accs,a]);
    showToast(editId?"Account updated":"Account added");closeM();
  };
  const delAcc=id=>{
    const a=accs.find(x=>x.id===id);if(!a||!confirm(`Delete "${a.name}"?`))return;
    sa(accs.filter(x=>x.id!==id));showToast("Account deleted",true,()=>sa(prev=>[a,...prev]));
  };
  const doEditAcc=a=>{setAccForm({name:a.name,color:a.color,ib:String(a.ib)});setEditId(a.id);setModal("acc");};

  const doAddCat=()=>{
    if(!catForm.label)return;
    const id=editId||catForm.label.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")||uid();
    const c={id,...catForm};
    sc(editId?cats.map(x=>x.id===editId?{...x,...c}:x):[...cats,c]);
    showToast(editId?"Category updated":"Category added");closeM();
  };
  const delCat=id=>{
    const c=cats.find(x=>x.id===id);if(!c||!confirm(`Delete "${c.label}"?`))return;
    sc(cats.filter(x=>x.id!==id));showToast("Category deleted");
  };
  const doEditCat=c=>{setCatForm({label:c.label,icon:c.icon,color:c.color});setEditId(c.id);setModal("cat");};

  const doAddGoal=()=>{
    if(!goalForm.name||!goalForm.targetAmount)return;
    const g={...goalForm,id:editId||uid(),targetAmount:parseFloat(goalForm.targetAmount)||0,savedAmount:parseFloat(goalForm.savedAmount)||0};
    sg(editId?goals.map(x=>x.id===editId?g:x):[...goals,g]);
    const reached=g.targetAmount>0&&g.savedAmount>=g.targetAmount;
    if(reached)fireConfetti();
    showToast(reached?"Goal reached! 🎉":editId?"Goal updated":"Goal added");closeM();
  };
  const delGoal=id=>{
    const g=goals.find(x=>x.id===id);if(!g||!confirm(`Delete "${g.name}"?`))return;
    sg(goals.filter(x=>x.id!==id));showToast("Goal deleted",true,()=>sg(prev=>[g,...prev]));
  };
  const doEditGoal=g=>{setGoalForm({name:g.name,targetAmount:String(g.targetAmount),savedAmount:String(g.savedAmount),icon:g.icon,color:g.color});setEditId(g.id);setModal("goal");};

  const doAddRec=()=>{
    if(!recForm.merchant||!recForm.amount||!recForm.accountId)return;
    const r={...recForm,id:editId||uid(),amount:parseFloat(recForm.amount)||0,dayOfMonth:parseInt(recForm.dayOfMonth)||1};
    sr(editId?recurring.map(x=>x.id===editId?r:x):[...recurring,r]);
    showToast(editId?"Recurring updated":"Recurring added");closeM();
  };
  const delRec=id=>{
    const r=recurring.find(x=>x.id===id);if(!r||!confirm(`Delete "${r.merchant}"?`))return;
    sr(recurring.filter(x=>x.id!==id));showToast("Recurring deleted");
  };
  const addRecurringNow=r=>{
    const tx={id:uid(),type:r.type,amount:r.amount,merchant:r.merchant,category:r.category,accountId:r.accountId,notes:r.notes||"",date:tod(),isSplit:false,splitPeople:1,splitSettled:false};
    st(prev=>[tx,...prev]);showToast(`Added "${r.merchant}"`);
  };

  // Debts
  const doAddDebt=()=>{
    if(!debtForm.personName||!debtForm.totalAmount)return;
    const total=parseFloat(debtForm.totalAmount)||0,paid=parseFloat(debtForm.paidBack)||0;
    const wasSettled=editId?debts.find(x=>x.id===editId)?.settled:false;
    const d={...debtForm,id:editId||uid(),totalAmount:total,paidBack:paid,settled:paid>=total&&total>0};
    sd(editId?debts.map(x=>x.id===editId?d:x):[d,...debts]);
    if(d.settled&&!wasSettled)fireConfetti();
    showToast(editId?"Debt updated":"Debt added");closeM();
  };
  const delDebt=id=>{
    const d=debts.find(x=>x.id===id);if(!d||!confirm(`Delete debt for "${d.personName}"?`))return;
    sd(debts.filter(x=>x.id!==id));showToast("Debt deleted",true,()=>sd(prev=>[d,...prev]));
  };
  const doEditDebt=d=>{setDebtForm({personName:d.personName,totalAmount:String(d.totalAmount),paidBack:String(d.paidBack),date:d.date,description:d.description||"",color:d.color||"#e11d48"});setEditId(d.id);setModal("debt");};
  const openRepay=d=>{setRepayForm({...iRepay,debtId:d.id,accountId:accs[0]?.id||""});setModal("repay");};
  const doRepay=()=>{
    if(!repayForm.amount||!repayForm.accountId||!repayForm.debtId)return;

            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",display:"flex"}}>{I.x(T.txt3)}</button>}

          <div style={{display:"flex",gap:8,marginBottom:10,overflowX:"auto",paddingBottom:2}}>
            <select value={fCat} onChange={e=>setFCat(e.target.value)} style={{background:T.card,color:T.txt,border:"none",borderRadius:10,padding:"9px 14px",fontSize:14,flexShrink:0,outline:"none"}}>

            </select>
            <select value={fAcc} onChange={e=>setFAcc(e.target.value)} style={{background:T.card,color:T.txt,border:"none",borderRadius:10,padding:"9px 14px",fontSize:14,flexShrink:0,outline:"none"}}>
              <option value="">All accounts</option>
              {accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          {search&&filtTxs.length>0&&(
            <div style={{background:dark?"#001533":"#deeaff",borderRadius:13,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",fontSize:14}}>

              <span style={{color:T.txt2}}>{filtTxs.length} txs · <strong style={{color:T.acc}}>{fmt(filtTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.isSplit?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount)),0))}</strong></span>
            </div>
          )}
          <div style={{background:T.card,borderRadius:18,overflow:"hidden",marginBottom:90}}>
            {filtTxs.length===0?<div style={{padding:24,color:T.txt3,textAlign:"center",fontSize:14}}>No transactions found</div>
            :filtTxs.map((t,i)=>{
              const c=getCat(t.category),a=accs.find(x=>x.id===t.accountId);
              const disp=t.isSplit&&t.type==="expense"?parseFloat(t.amount)/t.splitPeople:parseFloat(t.amount);
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderTop:i>0?`1px solid ${T.border}`:"none"}}>

                    <div style={{fontSize:12,color:T.txt2}}>{t.date} · {a?.name||"?"} · {c.label}</div>

                      <button onClick={()=>doEditTx(t)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}>{I.edit(T.acc)}</button>

                      <button onClick={()=>doDeleteTx(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}>{I.trash(T.red)}</button>

        {/* ══ PEOPLE (Splits / Debts / Recurring) ══ */}
        {tab==="splits"&&<>
          <div style={{marginBottom:12}}>

            <div style={{fontSize:13,color:T.txt2,marginTop:1}}>
              {totalDebt>0&&`You owe ${fmt(totalDebt)} · `}Others owe you {fmt(totalOwed)}
            </div>
          </div>
          <SubNav view={peopleView} setView={setPeopleView} items={[["splits","Splits"],["debts","Debts"],["recurring","Recurring"]]}/>

          {/* Splits */}
          {peopleView==="splits"&&<>
            {pendingSplits.length>0&&(
              <div style={{background:dark?"#002e14":"#d4f5df",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
                <div style={{fontWeight:700,fontSize:16,color:dark?"#30d158":"#15803d",marginBottom:4}}>💸 {fmt(totalOwed)} to collect</div>
                <div style={{fontSize:13,color:dark?"#4ade80":"#16a34a",marginBottom:10}}>{pendingSplits.length} split{pendingSplits.length>1?"s":""} pending</div>
                <button onClick={settleAll} style={{background:dark?"#30d158":"#16a34a",color:"#fff",border:"none",borderRadius:12,padding:"11px 20px",fontWeight:700,fontSize:15,cursor:"pointer",width:"100%"}}>Settle All → Log Income</button>
              </div>
            )}
            {pendingSplits.length===0

                      </div>
                      <div style={{display:"flex",gap:8,marginBottom:8}}>

                          <div key={l} style={{flex:1,background:T.bg,borderRadius:10,padding:"8px 6px",textAlign:"center"}}>

                      </div>
                    </div>

                      </div>
                    </div>

                })}
              </div>
            }
          </>}
        </>}

        {/* ══ GOALS ══ */}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

            <button onClick={()=>{setGoalForm(iGoal);setEditId(null);setModal("goal");}} style={{display:"flex",alignItems:"center",gap:6,background:T.acc,color:"#fff",border:"none",borderRadius:13,padding:"10px 16px",fontWeight:600,fontSize:15,cursor:"pointer"}}>

                      <div style={{display:"flex",gap:14}}>

                        <button onClick={()=>delGoal(g.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>{I.trash(T.red)}</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </>}

        {/* ══ ACCOUNTS (hidden tab, accessed via settings) ══ */}
        {tab==="accs"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div><div style={{fontWeight:700,fontSize:20}}>Accounts</div><div style={{fontSize:13,color:T.txt2,marginTop:1}}>Net: {fmt(totBal)}</div></div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:90}}>

                <div key={a.id} style={{background:T.card,borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:14}}>

                      <button onClick={()=>doEditAcc(a)} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>{I.edit(T.acc)}</button>

                    </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div><Label text="Amount (€)"/><input type="number" step="0.01" min="0" placeholder="0.00" value={repayForm.amount} onChange={e=>setRepayForm(f=>({...f,amount:e.target.value}))} style={inp}/></div>
              <div><Label text="Date"/><input type="date" value={repayForm.date} onChange={e=>setRepayForm(f=>({...f,date:e.target.value}))} style={{...inp,colorScheme:dark?"dark":"light"}}/></div>
            </div>
            <div style={{display:"flex",gap:7,marginBottom:14}}>
              {chips.map(v=><button key={v} onClick={()=>setRepayForm(f=>({...f,amount:String(v)}))} style={{flex:1,padding:"9px 0",borderRadius:11,border:`1.5px solid ${T.border}`,background:T.bg,color:T.txt,fontWeight:600,fontSize:14,cursor:"pointer"}}>€{v}</button>)}
              {remaining>20&&<button onClick={()=>setRepayForm(f=>({...f,amount:String((Math.ceil(remaining/2*100)/100).toFixed(2))}))} style={{flex:1,padding:"9px 0",borderRadius:11,border:`1.5px solid ${T.border}`,background:T.bg,color:T.txt,fontWeight:600,fontSize:14,cursor:"pointer"}}>Half</button>}
              <button onClick={()=>setRepayForm(f=>({...f,amount:String(remaining.toFixed(2))}))} style={{flex:1,padding:"9px 0",borderRadius:11,border:`2px solid ${T.acc}`,background:T.acc+"18",color:T.acc,fontWeight:700,fontSize:14,cursor:"pointer"}}>Full</button>
            </div>
            <div style={{marginBottom:14}}><Label text="From Account"/><select value={repayForm.accountId} onChange={e=>setRepayForm(f=>({...f,accountId:e.target.value}))} style={inp}><option value="">Select…</option>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
            <div style={{marginBottom:20}}><Label text="Notes (optional)"/><input type="text" placeholder="Any notes…" value={repayForm.notes} onChange={e=>setRepayForm(f=>({...f,notes:e.target.value}))} style={inp}/></div>
            <button onClick={doRepay} disabled={!repayForm.amount||!repayForm.accountId} style={{display:"block",width:"100%",background:!repayForm.amount||!repayForm.accountId?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!repayForm.amount||!repayForm.accountId?"not-allowed":"pointer",marginBottom:4}}>
              Log Repayment
            </button>
          </>);
        })()}
      </Sheet>

      {/* ── ACCOUNT SHEET ── */}
      <Sheet open={modal==="acc"} onClose={closeM} title={editId?"Edit Account":"New Account"} T={T}>
        <div style={{marginBottom:14}}><Label text="Account Name"/><input type="text" placeholder="e.g. N26, Cash, Savings…" value={accForm.name} onChange={e=>setAccForm(f=>({...f,name:e.target.value}))} style={inp}/></div>
        <div style={{marginBottom:14}}><Label text="Starting Balance (€)"/><input type="number" step="0.01" placeholder="0.00" value={accForm.ib} onChange={e=>setAccForm(f=>({...f,ib:e.target.value}))} style={inp}/></div>
        <div style={{marginBottom:22}}><Label text="Color"/><input type="color" value={accForm.color} onChange={e=>setAccForm(f=>({...f,color:e.target.value}))} style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/></div>
        <button onClick={doAddAcc} disabled={!accForm.name} style={{display:"block",width:"100%",background:!accForm.name?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!accForm.name?"not-allowed":"pointer",marginBottom:4}}>{editId?"Save Changes":"Add Account"}</button>
      </Sheet>

      {/* ── CATEGORY SHEET ── */}
      <Sheet open={modal==="cat"} onClose={closeM} title={editId?"Edit Category":"New Category"} T={T}>
        <div style={{marginBottom:14}}><Label text="Category Name"/><input type="text" placeholder="e.g. Dining, Groceries…" value={catForm.label} onChange={e=>setCatForm(f=>({...f,label:e.target.value}))} style={inp}/></div>
        <div style={{marginBottom:14}}><Label text="Icon (emoji)"/><input type="text" placeholder="🛒" value={catForm.icon} onChange={e=>setCatForm(f=>({...f,icon:e.target.value}))} style={inp}/></div>
        <div style={{marginBottom:22}}><Label text="Color"/><input type="color" value={catForm.color} onChange={e=>setCatForm(f=>({...f,color:e.target.value}))} style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/></div>
        <button onClick={doAddCat} disabled={!catForm.label} style={{display:"block",width:"100%",background:!catForm.label?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!catForm.label?"not-allowed":"pointer",marginBottom:4}}>{editId?"Save Changes":"Save Category"}</button>
      </Sheet>

      {/* ── GOAL SHEET ── */}
      <Sheet open={modal==="goal"} onClose={closeM} title={editId?"Edit Goal":"New Savings Goal"} T={T}>
        <div style={{marginBottom:14}}><Label text="Goal Name"/><input type="text" placeholder="e.g. Trip home, New laptop…" value={goalForm.name} onChange={e=>setGoalForm(f=>({...f,name:e.target.value}))} style={inp}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><Label text="Target (€)"/><input type="number" step="1" min="0" placeholder="400" value={goalForm.targetAmount} onChange={e=>setGoalForm(f=>({...f,targetAmount:e.target.value}))} style={inp}/></div>
          <div><Label text="Saved so far (€)"/><input type="number" step="1" min="0" placeholder="0" value={goalForm.savedAmount} onChange={e=>setGoalForm(f=>({...f,savedAmount:e.target.value}))} style={inp}/></div>
        </div>
        <div style={{marginBottom:14}}><Label text="Icon"/><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{GOAL_ICONS.map(ic=><button key={ic} onClick={()=>setGoalForm(f=>({...f,icon:ic}))} style={{width:44,height:44,borderRadius:12,border:`2px solid ${goalForm.icon===ic?T.acc:T.border}`,background:goalForm.icon===ic?T.acc+"18":"transparent",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{ic}</button>)}</div></div>
        <div style={{marginBottom:22}}><Label text="Color"/><input type="color" value={goalForm.color} onChange={e=>setGoalForm(f=>({...f,color:e.target.value}))} style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/></div>
        <button onClick={doAddGoal} disabled={!goalForm.name||!goalForm.targetAmount} style={{display:"block",width:"100%",background:!goalForm.name||!goalForm.targetAmount?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!goalForm.name||!goalForm.targetAmount?"not-allowed":"pointer",marginBottom:4}}>{editId?"Save Changes":"Create Goal"}</button>
      </Sheet>

      {/* ── RECURRING SHEET ── */}
      <Sheet open={modal==="rec"} onClose={closeM} title={editId?"Edit Recurring":"New Recurring Transaction"} T={T}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["expense","💸 Expense"],["income","💰 Income"]].map(([v,l])=><button key={v} onClick={()=>setRecForm(f=>({...f,type:v}))} style={{flex:1,padding:"11px 4px",borderRadius:13,border:`2px solid ${recForm.type===v?T.acc:T.border}`,background:recForm.type===v?T.acc:"transparent",color:recForm.type===v?"#fff":T.txt2,fontWeight:600,fontSize:14,cursor:"pointer"}}>{l}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><Label text="Amount (€)"/><input type="number" step="0.01" min="0" placeholder="0.00" value={recForm.amount} onChange={e=>setRecForm(f=>({...f,amount:e.target.value}))} style={inp}/></div>
          <div><Label text="Day of month"/><input type="number" min="1" max="31" placeholder="1" value={recForm.dayOfMonth} onChange={e=>setRecForm(f=>({...f,dayOfMonth:e.target.value}))} style={inp}/></div>
        </div>
        <div style={{marginBottom:14}}><Label text="Merchant / Name"/><input type="text" placeholder="e.g. Apple Music, Rent…" value={recForm.merchant} onChange={e=>setRecForm(f=>({...f,merchant:e.target.value}))} style={inp}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div><Label text="Account"/><select value={recForm.accountId} onChange={e=>setRecForm(f=>({...f,accountId:e.target.value}))} style={inp}><option value="">Select…</option>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          <div><Label text="Category"/><select value={recForm.category} onChange={e=>setRecForm(f=>({...f,category:e.target.value}))} style={inp}>{cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></div>
        </div>
        <div style={{marginBottom:20}}><Label text="Notes (optional)"/><input type="text" placeholder="Any notes…" value={recForm.notes} onChange={e=>setRecForm(f=>({...f,notes:e.target.value}))} style={inp}/></div>
        <button onClick={doAddRec} disabled={!recForm.merchant||!recForm.amount||!recForm.accountId} style={{display:"block",width:"100%",background:!recForm.merchant||!recForm.amount||!recForm.accountId?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!recForm.merchant||!recForm.amount||!recForm.accountId?"not-allowed":"pointer",marginBottom:4}}>{editId?"Save Changes":"Save Recurring"}</button>
      </Sheet>

      {/* ── NOTIFICATIONS SHEET ── */}
      <Sheet open={modal==="notifs"} onClose={closeM} title="Notifications" T={T}>
        {notifs.length===0
          ?<div style={{textAlign:"center",padding:"30px 0 40px",color:T.txt3}}><div style={{fontSize:42,marginBottom:8}}>🔔</div><div style={{fontWeight:600,fontSize:15,color:T.txt2}}>All caught up</div></div>
          :<div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:12}}>
            {notifs.map(n=>{
              const cc=({blue:T.acc,red:T.red,green:T.green})[n.tone]||T.acc;
              return(
                <button key={n.k} onClick={()=>{sdn([...dismissedNotifs,n.k]);setTab(n.tab);if(n.ana)setAnaView(n.ana);if(n.pv)setPeopleView(n.pv);closeM();}} className="mt-press"
                  style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:14,padding:"13px 14px",cursor:"pointer",textAlign:"left",width:"100%"}}>
                  <div style={{width:38,height:38,borderRadius:11,background:cc+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:14,color:T.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</div>
                    <div style={{fontSize:12,color:T.txt2,marginTop:1}}>{n.sub}</div>
                  </div>
                  <span style={{color:T.txt3,fontSize:18}}>›</span>
                </button>
              );
            })}
          </div>
        }
      </Sheet>

      {/* ── SETTINGS SHEET ── */}
      <Sheet open={modal==="settings"} onClose={closeM} title="Settings & Data" T={T}>
        <input type="file" ref={fileRef} accept=".json" style={{display:"none"}} onChange={doImport}/>
        <div style={{marginBottom:10}}><Label text="Data Backup"/></div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          <button onClick={doExport} style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.download(T.acc)}</div>
            <div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>Export backup</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>Download all data as JSON</div></div>
          </button>
          <button onClick={()=>fileRef.current?.click()} style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.green+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.upload(T.green)}</div>
            <div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>Restore backup</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>Import a JSON backup file</div></div>
          </button>
          <button onClick={exportCSV} style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.download(T.txt2)}</div>
            <div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>Export CSV</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>Last 200 transactions</div></div>
          </button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={()=>{setTab("accs");closeM();}} style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.wallet(T.acc)}</div>
            <div><div style={{fontWeight:600,fontSize:14,color:T.txt}}>Accounts</div><div style={{fontSize:12,color:T.txt2,marginTop:2}}>Manage bank accounts</div></div>
          </button>
          <button onClick={()=>{setTab("categories");closeM();}} style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.goal(T.acc)}</div>
            <div><div style={{fontWeight:600,fontSize:14,color:T.txt}}>Categories</div><div style={{fontSize:12,color:T.txt2,marginTop:2}}>Manage categories</div></div>
          </button>
        </div>
        <button onClick={()=>{setTab("stats");setAnaView("budget");closeM();}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left",marginBottom:20}}>
          <div style={{width:40,height:40,borderRadius:12,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.budget(T.acc,20)}</div>
          <div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>Monthly Budgets</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>Set limits per category</div></div>
        </button>
        <div style={{marginBottom:10}}><Label text="Preferences"/></div>
        <div style={{background:T.bg,borderRadius:14,overflow:"hidden",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>{I.lock(T.acc,20)}<div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>App Lock</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>{pin?"Enabled":"4-digit passcode"}</div></div></div>
            <Toggle value={!!pin} onChange={v=>{v?setPinFlow("set"):setPinFlow("disable");}} T={T}/>
          </div>
          <div style={{height:1,background:T.border}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:20}}>📳</span><div><div style={{fontWeight:600,fontSize:15,color:T.txt}}>Haptic feedback</div><div style={{fontSize:12,color:T.txt2,marginTop:1}}>Vibrate on taps</div></div></div>
            <Toggle value={hapticsOn} onChange={setHap} T={T}/>
          </div>
        </div>
        <div style={{marginBottom:10}}><Label text="Stats"/></div>
        <div style={{background:T.bg,borderRadius:14,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {[["Transactions",txs.length],["Accounts",accs.length],["Goals",goals.length],["Debts",debts.length],["Recurring",recurring.length]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:14,color:T.txt2}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600,color:T.txt}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{padding:"12px 16px",background:dark?"#2d0000":"#ffdede",borderRadius:14}}>
          <div style={{fontWeight:600,fontSize:14,color:dark?"#ff453a":"#c0392b",marginBottom:4}}>⚠️ Danger zone</div>
          <div style={{fontSize:12,color:dark?"#ff6b6b":"#7f1d1d",marginBottom:10}}>Permanently deletes all your data.</div>
          <button onClick={()=>{if(confirm("Delete ALL data? This cannot be undone.")){sa(DEFACCS);st([]);sg([]);sr([]);sd([]);closeM();showToast("All data cleared",false);}}} style={{background:dark?"#ff453a":"#c0392b",color:"#fff",border:"none",borderRadius:11,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer"}}>Clear all data</button>
        </div>
        <div style={{height:16}}/>
      </Sheet>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
