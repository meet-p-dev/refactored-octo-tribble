*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{min-height:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;min-height:100vh;background:#f2f2f7}
#root{min-height:100vh;max-width:480px;margin:0 auto;position:relative}
input,select,button,textarea{font-family:inherit;font-size:17px;line-height:1.4;-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation}
input:focus,select:focus,textarea:focus{outline:none}

input[type=color]{-webkit-appearance:none;border:none;cursor:pointer}

select{-webkit-appearance:none}
@keyframes mtFade{from{opacity:0}to{opacity:1}}
@keyframes mtRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes mtPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes mtSheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes mtSpin{to{transform:rotate(360deg)}}
@keyframes mtPulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes mtConfetti{0%{transform:translateY(-10vh) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9}}
@keyframes mtShine{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes mtShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
@keyframes mtRingFill{from{stroke-dashoffset:var(--c)}}
.mt-rise{animation:mtRise .42s cubic-bezier(.22,1,.36,1) both}
.mt-pop{animation:mtPop .34s cubic-bezier(.34,1.56,.64,1) both}
.mt-press{transition:transform .12s ease}
.mt-press:active{transform:scale(.94)}
.mt-row:active{filter:brightness(.97)}
.mt-hscroll{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-padding-left:16px;margin:0 -16px;padding:2px 16px}
.mt-hscroll>*{scroll-snap-align:start;flex-shrink:0}

function MiniChart({data,T,fmt}){
  const [sel,setSel]=useState(data.length-1);
  const f=fmt||(v=>v);
  const cur=data[sel]||data[data.length-1]||{label:"",income:0,spent:0};
  const max=Math.max(...data.flatMap(d=>[d.income,d.spent]),1);
  const W=300,H=140,bp=20,tp=8,aH=H-bp-tp;
  const sw=W/data.length,bw=Math.min(sw*.28,10);
  return(
    <div>
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:13,fontWeight:700,color:T.txt}}>{cur.label}</span>
        <span style={{display:"flex",gap:12,fontSize:13,fontWeight:700}}>
          <span style={{color:T.cG}}>↑ {f(cur.income)}</span>
          <span style={{color:T.cR}}>↓ {f(cur.spent)}</span>
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{touchAction:"manipulation"}}>
        {[.33,.66,1].map(fr=>(
          <line key={fr} x1={0} y1={tp+(1-fr)*aH} x2={W} y2={tp+(1-fr)*aH} stroke={T.border} strokeWidth={.5}/>
        ))}
        {data.map((d,i)=>{
          const cx=(i+.5)*sw,iH=(d.income/max)*aH,sH=(d.spent/max)*aH,on=i===sel;
          return(
            <g key={i} onClick={()=>setSel(i)} style={{cursor:"pointer"}}>
              {on&&<rect x={cx-sw/2+1} y={tp} width={sw-2} height={aH} fill={T.acc} opacity={.10} rx={4}/>}
              {iH>0&&<rect x={cx-bw-1} y={tp+aH-iH} width={bw} height={iH} fill={T.cG} rx={2} opacity={on?1:.5}/>}
              {sH>0&&<rect x={cx+1} y={tp+aH-sH} width={bw} height={sH} fill={T.cR} rx={2} opacity={on?1:.5}/>}
              <text x={cx} y={H-5} textAnchor="middle" fontSize={7.5} fill={on?T.txt:T.txt3} fontWeight={on?700:400}>{d.label}</text>
              <rect x={cx-sw/2} y={0} width={sw} height={H} fill="transparent"/>
            </g>
          );
        })}
        <rect x={W-54} y={tp+1} width={7} height={7} fill={T.cG} rx={1.5}/>
        <text x={W-44} y={tp+7.5} fontSize={7.5} fill={T.txt2}>Income</text>
        <rect x={W-54} y={tp+12} width={7} height={7} fill={T.cR} rx={1.5}/>
        <text x={W-44} y={tp+18.5} fontSize={7.5} fill={T.txt2}>Spent</text>
      </svg>
    </div>
  );
}

  return(

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:T.card,borderRadius:"22px 22px 0 0",paddingBottom:"calc(env(safe-area-inset-bottom) + 12px)",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 30px rgba(0,0,0,.3)",animation:"mtSheetUp .34s cubic-bezier(.22,1,.36,1)"}}>
        <div style={{width:36,height:4,background:T.border,borderRadius:99,margin:"12px auto 2px",flexShrink:0}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px 10px",flexShrink:0,borderBottom:`1px solid ${T.border}`}}>

}

  return(

    </div>

const haptic=(ms=10)=>{try{if(window.__mtHaptics!==false&&navigator.vibrate)navigator.vibrate(ms);}catch{}};

function AnimatedNumber({value,format,style,dur=700}){
  const [d,setD]=useState(value);
  const ref=useRef(value);
  useEffect(()=>{
    const from=ref.current,to=value||0,start=performance.now();
    if(from===to){setD(to);return;}
    let raf;
    const tick=now=>{
      const t=Math.min((now-start)/dur,1),e=1-Math.pow(1-t,3);
      setD(from+(to-from)*e);
      if(t<1)raf=requestAnimationFrame(tick);else{ref.current=to;setD(to);}
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[value]);
  return <span style={style}>{format?format(d):Math.round(d)}</span>;
}

function Ring({pct,size=66,stroke=7,color,track,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r;
  const off=c*(1-Math.min(Math.max(pct||0,0),1));
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{transition:"stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)"}}/>
      </svg>
      {children!=null&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>{children}</div>}
    </div>
  );
}

function Confetti({show}){
  const pieces=useMemo(()=>Array.from({length:64},(_,i)=>({
    id:i,left:Math.random()*100,delay:Math.random()*.45,dur:1.7+Math.random()*1.5,
    color:["#ff453a","#30d158","#0a84ff","#ffd60a","#bf5af2","#ff9f0a","#64d2ff"][i%7],
    w:6+Math.random()*7,rot:Math.random()*360
  })),[show]);
  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:998,pointerEvents:"none",overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",top:0,left:p.left+"%",width:p.w,height:p.w*.62,background:p.color,borderRadius:2,transform:`rotate(${p.rot}deg)`,animation:`mtConfetti ${p.dur}s ${p.delay}s cubic-bezier(.4,0,.7,1) forwards`}}/>
      ))}
    </div>
  );
}

function PinLock({T,mode,storedPin,onDone,onCancel}){
  const [stage,setStage]=useState(mode==="set"?"new":"enter");
  const [first,setFirst]=useState("");
  const [entry,setEntry]=useState("");
  const [shake,setShake]=useState(false);
  const [err,setErr]=useState("");
  const titles={enter:"Enter Passcode",new:"Create Passcode",confirm:"Confirm Passcode"};
  const subs={enter:"Unlock MoneyTrack",new:"Choose a 4-digit code",confirm:"Re-enter your code"};
  const fail=msg=>{setShake(true);setErr(msg||"");haptic([30,40,30]);setTimeout(()=>{setShake(false);setEntry("");setErr("");},520);};
  const commit=code=>{
    if(stage==="enter"){ if(code===storedPin){haptic(14);onDone(code);} else fail("Wrong passcode"); }
    else if(stage==="new"){ setFirst(code);setEntry("");setStage("confirm"); }
    else { if(code===first){haptic(14);onDone(code);} else {setStage("new");setFirst("");fail("Codes didn't match");} }
  };
  const press=n=>{ if(entry.length>=4)return; haptic(8); const next=entry+n; setEntry(next); if(next.length===4)setTimeout(()=>commit(next),150); };
  const del=()=>{haptic(8);setEntry(e=>e.slice(0,-1));};
  const keys=["1","2","3","4","5","6","7","8","9","","0","del"];
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingTop:"env(safe-area-inset-top)",paddingBottom:"calc(env(safe-area-inset-bottom) + 24px)",animation:"mtFade .25s ease"}}>
      <div style={{position:"absolute",top:"14vh",width:120,height:120,borderRadius:99,background:`radial-gradient(circle,${T.acc}33,transparent 70%)`,filter:"blur(8px)"}}/>
      <div style={{width:66,height:66,borderRadius:20,background:T.acc,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:18,boxShadow:`0 10px 34px ${T.acc}66`}} className="mt-pop">{I.lock("#fff",30)}</div>
      <div style={{fontWeight:700,fontSize:22,color:T.txt,letterSpacing:-.3}}>{titles[stage]}</div>
      <div style={{fontSize:14,color:err?T.red:T.txt2,marginTop:5,height:18,fontWeight:err?600:400}}>{err||subs[stage]}</div>
      <div style={{display:"flex",gap:18,margin:"26px 0 34px",animation:shake?"mtShake .5s":"none"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:15,height:15,borderRadius:99,background:i<entry.length?(err?T.red:T.acc):"transparent",border:`2px solid ${i<entry.length?(err?T.red:T.acc):T.inpB}`,transition:"all .15s"}}/>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,76px)",gap:16}}>
        {keys.map((k,i)=>k===""?<div key={i}/>:k==="del"?(
          <button key={i} onClick={del} className="mt-press" style={{height:76,borderRadius:99,background:"transparent",border:"none",color:T.txt,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.x(T.txt2)}</button>
        ):(
          <button key={i} onClick={()=>press(k)} className="mt-press" style={{height:76,borderRadius:99,background:T.card,border:`1px solid ${T.border}`,color:T.txt,fontSize:30,fontWeight:500,cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>{k}</button>
        ))}
      </div>
      {onCancel&&<button onClick={onCancel} style={{marginTop:26,background:"none",border:"none",color:T.acc,fontSize:16,fontWeight:600,cursor:"pointer"}}>Cancel</button>}
    </div>
  );
}

      setTimeout(()=>setToast(null),2400);

  },[]);

  // Setters accept a value OR a functional updater; persist the resolved next value
  // (LS.s JSON.stringifies, so passing a raw function would store "undefined").
  const mkSet=(setState,key)=>v=>setState(prev=>{const next=typeof v==='function'?v(prev):v;LS.s(key,next);return next;});
  const sa=mkSet(setAccs,"mt-accs");
  const sc=mkSet(setCats,"mt-cats");
  const st=mkSet(setTxs,"mt-txs");
  const sg=mkSet(setGoals,"mt-goals");
  const sr=mkSet(setRecurring,"mt-recurring");
  const sb=mkSet(setBudgets,"mt-budgets");
  const sdn=mkSet(setDismissedNotifs,"mt-dismissed-notifs");
  const sfab=mkSet(setFabSide,"mt-fab-side");
  const sft=mkSet(setFabTop,"mt-fab-top");
  // FAB drag: follow finger anywhere; on release snap X to nearest edge, keep Y where dropped
  const onFabDown=e=>{
    e.preventDefault();
    const sx=e.clientX,sy=e.clientY;let moved=false;
    const move=ev=>{if(Math.abs(ev.clientX-sx)>6||Math.abs(ev.clientY-sy)>6)moved=true;if(moved)setFabDrag({x:ev.clientX,y:ev.clientY});};
    const up=ev=>{
      window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
      setFabDrag(null);
      if(moved){
        sfab(ev.clientX<window.innerWidth/2?'left':'right');
        sft(Math.max(8,Math.min(window.innerHeight-70,ev.clientY-31)));
        haptic(12);
      } else openAddPrefill();
    };
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
  };
  const setHap=v=>{setHapticsOn(v);LS.s("mt-haptics",v);};
  const tgDk=()=>{const nd=!dark;setDark(nd);LS.s("mt-dark",nd);};

  const getCat=id=>cats.find(c=>c.id===id)||CATS.find(c=>c.id===id)||{icon:"📦",color:"#9ca3af",label:id||"Other"};

  const getBal=aid=>{
    const a=accs.find(x=>x.id===aid);if(!a)return 0;
    let b=parseFloat(a.ib)||0;
    txs.forEach(t=>{
      const v=parseFloat(t.amount)||0;
      if(t.type==="income"   &&t.accountId===aid) b+=v;
      if(t.type==="expense"  &&t.accountId===aid) b-=v;
      if(t.type==="transfer" &&t.accountId===aid) b-=v;
      if(t.type==="transfer" &&t.toAccountId===aid) b+=v;
    });
    return b;
  };

  const totBal=useMemo(()=>accs.reduce((s,a)=>s+getBal(a.id),0),[accs,txs]);
  const mLbl=new Date().toLocaleString("default",{month:"long"});
  const mSt=useMemo(()=>{
    const k=new Date().toISOString().slice(0,7);
    const m=txs.filter(t=>t.date.startsWith(k));
    return{
      inc:m.filter(t=>t.type==="income").reduce((s,t)=>s+parseFloat(t.amount),0),
      spt:m.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount)),0),
    };
  },[txs]);

  const chartD=useMemo(()=>{
    const now=new Date();
    return Array.from({length:12},(_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      return{
        label:d.toLocaleString("default",{month:"short"}),
        income:txs.filter(t=>t.type==="income"&&t.date.startsWith(k)).reduce((s,t)=>s+parseFloat(t.amount),0),
        spent:txs.filter(t=>t.type==="expense"&&t.date.startsWith(k)).reduce((s,t)=>s+(t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount)),0),
      };
    });
  },[txs]);

  const catD=useMemo(()=>{
    const map={};
    txs.filter(t=>t.type==="expense").forEach(t=>{
      const c=t.category||"other";
      if(!map[c])map[c]={total:0,merchants:{}};
      const personalAmt=t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount);
      map[c].total+=personalAmt;
      const m=t.merchant||"Unknown";
      map[c].merchants[m]=(map[c].merchants[m]||0)+personalAmt;
    });
    return Object.entries(map).sort(([,a],[,b])=>b.total-a.total).map(([id,v])=>({id,...v,...getCat(id)}));
  },[txs,cats]);

  const filtTxs=useMemo(()=>
    [...txs].sort((a,b)=>b.date.localeCompare(a.date)).filter(t=>{

      if(fCat&&t.category!==fCat)return false;

      return true;
    }),[txs,search,fCat,fAcc]);

  const recTxs=useMemo(()=>[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8),[txs]);

  // Split / WG data
  const pendingSplits=useMemo(()=>txs.filter(t=>t.isSplit&&!t.splitSettled&&t.type==="expense"),[txs]);
  const totalOwed=useMemo(()=>pendingSplits.reduce((s,t)=>{
    const full=parseFloat(t.amount)||0;
    const share=full/t.splitPeople;
    return s+(full-share);
  },0),[pendingSplits]);

  // Recurring due this month
  const recurringDue=useMemo(()=>{
    const today=new Date();
    const dom=today.getDate();

  },[recurring]);

  // ── Budgets, Safe-to-spend & Insights ──
  const monthKey=new Date().toISOString().slice(0,7);
  const now0=new Date();
  const daysInMonth=new Date(now0.getFullYear(),now0.getMonth()+1,0).getDate();
  const dayOfMonth=now0.getDate();

  const monthCatSpent=useMemo(()=>{
    const m={};
    txs.filter(t=>t.type==="expense"&&t.date.startsWith(monthKey)).forEach(t=>{

  ,[cats,budgets,monthCatSpent]);

  const delTx=id=>st(txs.filter(t=>t.id!==id));
  // improved delete with undo
  const doDeleteTx=id=>{
    const old=txs.find(t=>t.id===id);
    if(!old)return;
    st(txs.filter(t=>t.id!==id));
    setLastAction({type:'del-tx',payload:old});
    showToast('Transaction deleted',true,()=>{st(prev=>[old,...prev]);});
  };
  const doEditTx=t=>{setTxForm({...iTx,...t});setEditId(t.id);setModal("tx");};
  const doAddAcc=()=>{
    if(!accForm.name)return;

    const a=accs.find(x=>x.id===id);

  const doEditAcc=a=>{setAccForm({name:a.name,color:a.color,ib:String(a.ib)});setEditId(a.id);setModal("acc");};
  const doAddCat=()=>{

    sc(cats.filter(c=>c.id!==id));
    setLastAction({type:'del-cat',payload:c});
    showToast('Category deleted',true,()=>{sc(prev=>[c,...prev]);});
  };
  const doEditCat=c=>{setCatForm({label:c.label,icon:c.icon,color:c.color});setEditId(c.id);setModal("cat");};
  const openAdd=()=>{setTxForm({...iTx,accountId:accs[0]?.id||""});setEditId(null);setModal("tx");};

  // prefill last used account/category when opening add
  const openAddPrefill=()=>{
    const lastAcc=localStorage.getItem('mt-last-account');
    const lastCat=localStorage.getItem('mt-last-category');
    setTxForm({...iTx,accountId:lastAcc||accs[0]?.id||"",category:lastCat||iTx.category});
    setEditId(null);setModal("tx");
  };

  // export recent transactions as CSV
  const exportRecentCSV=(n=100)=>{
    const rows=txs.slice(0,n);
    const hdr=['id','date','type','amount','merchant','category','accountId','notes'];
    const csv=[hdr.join(',')];

    const blob=new Blob([csv.join('\n')],{type:'text/csv;charset=utf-8;'});

      const newTxs=[];
      const triggeredIds=new Set();
      recurring.forEach(r=>{
        if(!r.active) return;
        if((parseInt(r.dayOfMonth)||0) !== day) return;
        if(r.lastTriggered===todayStr) return;

        newTxs.push(tx);
        triggeredIds.add(r.id);
      });
      // Persist with concrete arrays: st/sr JSON.stringify their arg, so a functional
      // updater would serialize to "undefined" and corrupt localStorage. One call each
      // also avoids stale-closure clobbering when multiple items are due the same day.
      if(newTxs.length){
        st([...newTxs,...txs]);
        sr(recurring.map(x=>triggeredIds.has(x.id)?{...x,lastTriggered:todayStr}:x));
        showToast('Added due recurring transactions',true);
      }

          <Label text="Icon"/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {GOAL_ICONS.map(ic=>(
              <button key={ic} onClick={()=>setGoalForm(f=>({...f,icon:ic}))}
                style={{width:44,height:44,borderRadius:12,border:`2px solid ${goalForm.icon===ic?T.acc:T.border}`,background:goalForm.icon===ic?T.acc+"18":"transparent",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {ic}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:22}}>
          <Label text="Color"/>
          <input type="color" value={goalForm.color} onChange={e=>setGoalForm(f=>({...f,color:e.target.value}))}
            style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/>
        </div>
        <button onClick={doAddGoal} disabled={!goalForm.name||!goalForm.targetAmount}
          style={{display:"block",width:"100%",background:!goalForm.name||!goalForm.targetAmount?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!goalForm.name||!goalForm.targetAmount?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Create Goal"}
        </button>
      </Sheet>

      {/* ── Recurring Sheet ── */}
      <Sheet open={modal==="rec"} onClose={closeM} title={editId?"Edit Recurring":"New Recurring Transaction"} T={T}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["expense","💸 Expense"],["income","💰 Income"]].map(([v,l])=>(
            <button key={v} onClick={()=>setRecForm(f=>({...f,type:v}))}
              style={{flex:1,padding:"11px 4px",borderRadius:13,border:`2px solid ${recForm.type===v?T.acc:T.border}`,background:recForm.type===v?T.acc:"transparent",color:recForm.type===v?"#fff":T.txt2,fontWeight:600,fontSize:14,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Label text="Amount (€)"/>
            <input type="number" step="0.01" min="0" placeholder="0.00"
              value={recForm.amount} onChange={e=>setRecForm(f=>({...f,amount:e.target.value}))} style={inp}/>
          </div>
          <div>
            <Label text="Day of month"/>
            <input type="number" min="1" max="31" placeholder="1"
              value={recForm.dayOfMonth} onChange={e=>setRecForm(f=>({...f,dayOfMonth:e.target.value}))} style={inp}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <Label text="Merchant / Name"/>
          <input type="text" placeholder="e.g. Apple Music, Rent…"
            value={recForm.merchant} onChange={e=>setRecForm(f=>({...f,merchant:e.target.value}))} style={inp}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Label text="Account"/>
            <select value={recForm.accountId} onChange={e=>setRecForm(f=>({...f,accountId:e.target.value}))} style={inp}>
              <option value="">Select…</option>
              {accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div>
            <Label text="Category"/>
            <select value={recForm.category} onChange={e=>setRecForm(f=>({...f,category:e.target.value}))} style={inp}>
              {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <Label text="Notes (optional)"/>
          <input type="text" placeholder="Any notes…"
            value={recForm.notes} onChange={e=>setRecForm(f=>({...f,notes:e.target.value}))} style={inp}/>
        </div>
        <button onClick={doAddRec} disabled={!recForm.merchant||!recForm.amount||!recForm.accountId}
          style={{display:"block",width:"100%",background:!recForm.merchant||!recForm.amount||!recForm.accountId?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!recForm.merchant||!recForm.amount||!recForm.accountId?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Save Recurring"}
        </button>
      </Sheet>

      {/* ── Notifications Sheet ── */}
      <Sheet open={modal==="notifs"} onClose={closeM} title="Notifications" T={T}>
        {notifs.length===0?(
          <div style={{textAlign:"center",padding:"30px 0 40px",color:T.txt3}}>
            <div style={{fontSize:42,marginBottom:8}}>🔔</div>
            <div style={{fontWeight:600,fontSize:15,color:T.txt2}}>You're all caught up</div>
            <div style={{fontSize:13,marginTop:4}}>No reminders right now</div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:12}}>
            {notifs.map(n=>{
              const cc=({blue:T.acc,red:T.red,green:T.green})[n.tone]||T.acc;
              return(
                <button key={n.k} onClick={()=>{sdn([...dismissedNotifs,n.k]);setTab(n.tab);if(n.ana)setAnaView(n.ana);closeM();}} className="mt-press"
                  style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:14,padding:"13px 14px",cursor:"pointer",textAlign:"left",width:"100%"}}>
                  <div style={{width:38,height:38,borderRadius:11,background:cc+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:14,color:T.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.title}</div>
                    <div style={{fontSize:12,color:T.txt2,marginTop:1}}>{n.sub}</div>
                  </div>
                  <span style={{color:T.txt3,fontSize:18,flexShrink:0}}>›</span>
                </button>
              );
            })}
          </div>
        )}
      </Sheet>

      {/* ── Settings Sheet ── */}
      <Sheet open={modal==="settings"} onClose={closeM} title="Settings & Data" T={T}>
        <input type="file" ref={fileRef} accept=".json" style={{display:"none"}} onChange={doImport}/>
        <div style={{marginBottom:10}}>
          <Label text="Data Backup"/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          <button onClick={doExport}
            style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.download(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Export backup</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Download all data as JSON</div>
            </div>
          </button>
          <button onClick={()=>fileRef.current?.click()}
            style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.green+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.upload(T.green)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Restore backup</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Import a JSON backup file</div>
            </div>
          </button>
          <button onClick={()=>exportRecentCSV(200)}
            style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.card,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.download(T.txt)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Export recent CSV</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Download last 200 transactions as CSV</div>
            </div>
          </button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={()=>{setTab('accs');closeM();}}
            style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.wallet(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:T.txt}}>Manage Accounts</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:2}}>Add, edit or remove bank accounts</div>
            </div>
          </button>
          <button onClick={()=>{setTab('categories');closeM();}}
            style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.goal(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:T.txt}}>Manage Categories</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:2}}>Create or remove expense categories</div>
            </div>
          </button>
        </div>
        <button onClick={()=>{setTab('stats');setAnaView('budget');closeM();}}
          style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left",marginBottom:24}}>
          <div style={{width:40,height:40,borderRadius:12,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.budget(T.acc,20)}</div>
          <div>
            <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Set monthly budgets</div>
            <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Limits & alerts per category</div>
          </div>
        </button>
        <div style={{marginBottom:10}}>
          <Label text="Privacy & Preferences"/>
        </div>
        <div style={{background:T.bg,borderRadius:14,overflow:"hidden",marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {I.lock(T.acc,20)}
              <div>
                <div style={{fontWeight:600,fontSize:15,color:T.txt}}>App Lock</div>
                <div style={{fontSize:12,color:T.txt2,marginTop:1}}>{pin?"Passcode enabled":"Require a 4-digit passcode"}</div>
              </div>
            </div>
            <Toggle value={!!pin} onChange={v=>{v?enableLock():disableLock();}} T={T}/>
          </div>
          <div style={{height:1,background:T.border}}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:20,width:20,textAlign:"center"}}>📳</span>
              <div>
                <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Haptic feedback</div>
                <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Vibrate on taps & actions</div>
              </div>
            </div>
            <Toggle value={hapticsOn} onChange={setHap} T={T}/>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <Label text="Stats"/>
        </div>
        <div style={{background:T.bg,borderRadius:14,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {[["Transactions",txs.length],["Accounts",accs.length],["Goals",goals.length],["Recurring",recurring.length]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:14,color:T.txt2}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600,color:T.txt}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:16,padding:"12px 16px",background:dark?"#2d0000":"#ffdede",borderRadius:14}}>
          <div style={{fontWeight:600,fontSize:14,color:dark?"#ff453a":"#c0392b",marginBottom:4}}>⚠️ Danger zone</div>
          <div style={{fontSize:12,color:dark?"#ff6b6b":"#7f1d1d",marginBottom:10}}>This will permanently delete all your data.</div>
          <button onClick={()=>{if(confirm("Delete ALL data? This cannot be undone.")){sa(DEFACCS);st([]);sg([]);sr([]);closeM();showToast("All data cleared",false);}}}
            style={{background:dark?"#ff453a":"#c0392b",color:"#fff",border:"none",borderRadius:11,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer"}}>
            Clear all data
          </button>
        </div>
        <div style={{height:16}}/>
      </Sheet>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
