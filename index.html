<body>
<div id="root"></div>
<script type="text/babel">

  {id:"revolut",name:"Revolut",color:"#6d28d9",ib:0},
  {id:"revolut-savings",name:"Revolut Savings",color:"#7c3aed",ib:0},
  {id:"paypal",name:"PayPal",color:"#1d4ed8",ib:0},
  {id:"friend-loan",name:"Friend (Loan)",color:"#059669",ib:0},
];
const LT={
  bg:"#f2f2f7",card:"#fff",cardH:"#f0f0f5",border:"#e5e7eb",
  txt:"#000",txt2:"#6b7280",txt3:"#aeaeb2",inp:"#fff",inpB:"#d1d5db",

  s:[["#deeaff","#007aff"],["#d4f5df","#1a8f3a"],["#ffdede","#c0392b"]],

  bg:"#000000",card:"#1c1c1e",cardH:"#2c2c2e",border:"#38383a",
  txt:"#fff",txt2:"#8e8e93",txt3:"#48484a",inp:"#2c2c2e",inpB:"#48484a",
  acc:"#0a84ff",green:"#30d158",red:"#ff453a",cG:"#30d158",cR:"#ff453a",
  s:[["#001533","#4da6ff"],["#002e14","#30d158"],["#2d0000","#ff453a"]],

const LS={
  g:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

const fmt=n=>new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR"}).format(n||0);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const tod=()=>new Date().toISOString().slice(0,10);
const gc=id=>CATS.find(c=>c.id===id)||{icon:"📦",color:"#9ca3af",label:id||"Other"};

const I={
  home:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10.5V20h5v-5h4v5h5V10.5"/></svg>,
  list:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill={c} stroke="none"/><circle cx="4" cy="12" r="1.5" fill={c} stroke="none"/><circle cx="4" cy="18" r="1.5" fill={c} stroke="none"/></svg>,
  wallet:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="3"/><path d="M2 7.5L12 3l10 4.5"/><circle cx="17" cy="14" r="1.5" fill={c} stroke="none"/></svg>,
  chart:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  split:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><circle cx="12" cy="17" r="3"/><line x1="8" y1="11" x2="12" y2="14"/><line x1="16" y1="11" x2="12" y2="14"/></svg>,
  plus:(c,s=26)=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  edit:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>,
  trash:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
  moon:c=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,
  sun:c=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
  srch:c=><svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2} strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  x:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.2} strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  back:c=><svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2} strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>,
  repeat:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>,
  goal:c=><svg width={24} height={24} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.7} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  settings:c=><svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  download:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  upload:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  check:c=><svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={2.5} strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  bell:c=><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>,
};

function MiniChart({data,T}){
  const max=Math.max(...data.flatMap(d=>[d.income,d.spent]),1);
  const W=300,H=140,bp=20,tp=8,aH=H-bp-tp;
  const sw=W/data.length,bw=Math.min(sw*.28,10);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H}>
      {[.33,.66,1].map(f=>(
        <line key={f} x1={0} y1={tp+(1-f)*aH} x2={W} y2={tp+(1-f)*aH} stroke={T.border} strokeWidth={.5}/>
      ))}
      {data.map((d,i)=>{
        const cx=(i+.5)*sw,iH=(d.income/max)*aH,sH=(d.spent/max)*aH;
        return(
          <g key={i}>
            {iH>0&&<rect x={cx-bw-1} y={tp+aH-iH} width={bw} height={iH} fill={T.cG} rx={2}/>}
            {sH>0&&<rect x={cx+1} y={tp+aH-sH} width={bw} height={sH} fill={T.cR} rx={2}/>}
            <text x={cx} y={H-5} textAnchor="middle" fontSize={7.5} fill={T.txt3}>{d.label}</text>
          </g>
        );
      })}
      <rect x={W-54} y={tp+1} width={7} height={7} fill={T.cG} rx={1.5}/>
      <text x={W-44} y={tp+7.5} fontSize={7.5} fill={T.txt2}>Income</text>
      <rect x={W-54} y={tp+12} width={7} height={7} fill={T.cR} rx={1.5}/>
      <text x={W-44} y={tp+18.5} fontSize={7.5} fill={T.txt2}>Spent</text>
    </svg>
  );
}

function Sheet({open,onClose,title,T,children}){
  if(!open)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:300}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(2px)"}} onClick={onClose}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:T.card,borderRadius:"22px 22px 0 0",paddingBottom:"calc(env(safe-area-inset-bottom) + 12px)",maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 30px rgba(0,0,0,.3)"}}>
        <div style={{width:36,height:4,background:T.border,borderRadius:99,margin:"12px auto 2px",flexShrink:0}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px 10px",flexShrink:0,borderBottom:`1px solid ${T.border}`}}>
          <span style={{fontWeight:700,fontSize:18,color:T.txt}}>{title}</span>
          <button onClick={onClose} style={{background:T.cardH,border:"none",borderRadius:99,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.x(T.txt2)}</button>
        </div>
        <div style={{overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px 20px 4px"}}>
          {children}
        </div>
      </div>
    </div>
  );
}

function Label({text}){
  return <div style={{fontSize:12,fontWeight:600,color:"#8e8e93",textTransform:"uppercase",letterSpacing:.5,marginBottom:7}}>{text}</div>;
}

function Toggle({value,onChange,T}){
  return(
    <div onClick={()=>onChange(!value)} style={{width:51,height:31,borderRadius:99,background:value?T.acc:T.border,cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{position:"absolute",top:2,left:value?22:2,width:27,height:27,borderRadius:99,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,.3)",transition:"left .2s"}}/>
    </div>
  );
}

function App(){
  const sysDark=window.matchMedia?.("(prefers-color-scheme:dark)").matches??false;
  const [accs,setAccs]         = useState([]);
  const [cats,setCats]           = useState([]);
  const [txs,setTxs]           = useState([]);
  const [goals,setGoals]       = useState([]);
  const [recurring,setRecurring]= useState([]);
  const [dark,setDark]         = useState(()=>LS.g("mt-dark")??sysDark);
  const [tab,setTab]           = useState("home");
  const [modal,setModal]       = useState(null);
  const [editId,setEditId]     = useState(null);
  const [search,setSearch]     = useState("");
  const [fCat,setFCat]         = useState("");
  const [fAcc,setFAcc]         = useState("");
  const [drillCat,setDrillCat] = useState(null);
  const [ready,setReady]       = useState(false);
  const [toast,setToast]       = useState(null);
  const fileRef                = useRef();

  const T=dark?DK:LT;

  const iTx={date:tod(),type:"expense",amount:"",merchant:"",category:"other",accountId:"",toAccountId:"",notes:"",isSplit:false,splitPeople:2,splitSettled:false};
  const iAcc={name:"",color:"#3b82f6",ib:""};
  const iCat={label:"",icon:"📦",color:"#9ca3af"};
  const iGoal={name:"",targetAmount:"",savedAmount:"",icon:"🎯",color:"#007aff"};
  const iRec={merchant:"",amount:"",category:"other",accountId:"",type:"expense",dayOfMonth:1,active:true,notes:""};
  const [txForm,setTxForm]     = useState(iTx);
  const [accForm,setAccForm]   = useState(iAcc);
  const [catForm,setCatForm]   = useState(iCat);
  const [goalForm,setGoalForm] = useState(iGoal);
  const [recForm,setRecForm]   = useState(iRec);

  const showToast=(msg,ok=true)=>{
    setToast({msg,ok});
    setTimeout(()=>setToast(null),2400);
  };

  useEffect(()=>{
    const a=LS.g("mt-accs")||DEFACCS;
    const c=LS.g("mt-cats")||CATS;
    const t=LS.g("mt-txs")||[];
    const g=LS.g("mt-goals")||[];
    const r=LS.g("mt-recurring")||[];
    setAccs(a);setCats(c);setTxs(t);setGoals(g);setRecurring(r);
    if(!LS.g("mt-accs"))LS.s("mt-accs",DEFACCS);
    if(!LS.g("mt-cats"))LS.s("mt-cats",CATS);
    setReady(true);
  },[]);

  const sa=a=>{setAccs(a);LS.s("mt-accs",a);};
  const sc=c=>{setCats(c);LS.s("mt-cats",c);};
  const st=t=>{setTxs(t);LS.s("mt-txs",t);};
  const sg=g=>{setGoals(g);LS.s("mt-goals",g);};
  const sr=r=>{setRecurring(r);LS.s("mt-recurring",r);};
  const tgDk=()=>{const nd=!dark;setDark(nd);LS.s("mt-dark",nd);};

  const getCat=id=>cats.find(c=>c.id===id)||CATS.find(c=>c.id===id)||{icon:"📦",color:"#9ca3af",label:id||"Other"};

  const getBal=aid=>{
    const a=accs.find(x=>x.id===aid);if(!a)return 0;
    let b=parseFloat(a.ib)||0;
    txs.forEach(t=>{
      const v=parseFloat(t.amount)||0;
      if(t.type==="income"   &&t.accountId===aid) b+=v;
      if(t.type==="expense"  &&t.accountId===aid) b-=v;
      if(t.type==="transfer" &&t.accountId===aid) b-=v;
      if(t.type==="transfer" &&t.toAccountId===aid) b+=v;
    });
    return b;
  };

  const totBal=useMemo(()=>accs.reduce((s,a)=>s+getBal(a.id),0),[accs,txs]);
  const mLbl=new Date().toLocaleString("default",{month:"long"});
  const mSt=useMemo(()=>{
    const k=new Date().toISOString().slice(0,7);
    const m=txs.filter(t=>t.date.startsWith(k));
    return{
      inc:m.filter(t=>t.type==="income").reduce((s,t)=>s+parseFloat(t.amount),0),
      spt:m.filter(t=>t.type==="expense").reduce((s,t)=>s+(t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount)),0),
    };
  },[txs]);

  const chartD=useMemo(()=>{
    const now=new Date();
    return Array.from({length:12},(_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      return{
        label:d.toLocaleString("default",{month:"short"}),
        income:txs.filter(t=>t.type==="income"&&t.date.startsWith(k)).reduce((s,t)=>s+parseFloat(t.amount),0),
        spent:txs.filter(t=>t.type==="expense"&&t.date.startsWith(k)).reduce((s,t)=>s+(t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount)),0),
      };
    });
  },[txs]);

  const catD=useMemo(()=>{
    const map={};
    txs.filter(t=>t.type==="expense").forEach(t=>{
      const c=t.category||"other";
      if(!map[c])map[c]={total:0,merchants:{}};
      const personalAmt=t.isSplit?(parseFloat(t.amount)/t.splitPeople):parseFloat(t.amount);
      map[c].total+=personalAmt;
      const m=t.merchant||"Unknown";
      map[c].merchants[m]=(map[c].merchants[m]||0)+personalAmt;
    });
    return Object.entries(map).sort(([,a],[,b])=>b.total-a.total).map(([id,v])=>({id,...v,...getCat(id)}));
  },[txs,cats]);

  const filtTxs=useMemo(()=>
    [...txs].sort((a,b)=>b.date.localeCompare(a.date)).filter(t=>{
      if(search&&!t.merchant?.toLowerCase().includes(search.toLowerCase()))return false;
      if(fCat&&t.category!==fCat)return false;
      if(fAcc&&t.accountId!==fAcc)return false;
      return true;
    }),[txs,search,fCat,fAcc]);

  const recTxs=useMemo(()=>[...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8),[txs]);

  // Split / WG data
  const pendingSplits=useMemo(()=>txs.filter(t=>t.isSplit&&!t.splitSettled&&t.type==="expense"),[txs]);
  const totalOwed=useMemo(()=>pendingSplits.reduce((s,t)=>{
    const full=parseFloat(t.amount)||0;
    const share=full/t.splitPeople;
    return s+(full-share);
  },0),[pendingSplits]);

  // Recurring due this month
  const recurringDue=useMemo(()=>{
    const today=new Date();
    const dom=today.getDate();
    return recurring.filter(r=>r.active&&r.dayOfMonth>=dom&&r.dayOfMonth<=dom+3);
  },[recurring]);

  const closeM=()=>{setModal(null);setEditId(null);setTxForm(iTx);setAccForm(iAcc);setGoalForm(iGoal);setRecForm(iRec);};

  const doAddTx=()=>{
    if(!txForm.amount||!txForm.accountId)return;
    const tx={...txForm,id:editId||uid(),amount:parseFloat(txForm.amount),splitPeople:txForm.isSplit?parseInt(txForm.splitPeople)||2:1};
    st(editId?txs.map(t=>t.id===editId?tx:t):[tx,...txs]);
    closeM();
  };
  const delTx=id=>st(txs.filter(t=>t.id!==id));
  const doEditTx=t=>{setTxForm({...iTx,...t});setEditId(t.id);setModal("tx");};
  const doAddAcc=()=>{
    if(!accForm.name)return;
    const a={id:editId||uid(),...accForm,ib:parseFloat(accForm.ib)||0};
    sa(editId?accs.map(x=>x.id===editId?{...x,...a}:x):[...accs,a]);
    closeM();
  };
  const delAcc=id=>sa(accs.filter(a=>a.id!==id));

                            <button onClick={()=>delRec(r.id)} style={{background:"none",border:"none",cursor:"pointer",padding:2}}>{I.trash(T.red)}</button>
                          </div>
                        </div>
                      </div>
                    </div>

              </div>

          </>}

          {/* ══ GOALS ══ */}

                      <button onClick={()=>delCat(c.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",padding:2}}>{I.trash(T.red)}</button>
                    </div>
                  </div>
                ))}
            </div>
          </>}

            <Label text="Date"/>

            style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/>
        </div>
        <button onClick={doAddAcc} disabled={!accForm.name}
          style={{display:"block",width:"100%",background:!accForm.name?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!accForm.name?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Add Account"}
        </button>
      </Sheet>

      {/* ── Category Sheet ── */}
      <Sheet open={modal==="cat"} onClose={closeM} title={editId?"Edit Category":"New Category"} T={T}>
        <div style={{marginBottom:14}}>
          <Label text="Category Name"/>
          <input type="text" placeholder="e.g. Dining, Groceries…"
            value={catForm.label} onChange={e=>setCatForm(f=>({...f,label:e.target.value}))} style={inp}/>
        </div>
        <div style={{marginBottom:14}}>
          <Label text="Icon"/>
          <input type="text" placeholder="e.g. 🛒"
            value={catForm.icon} onChange={e=>setCatForm(f=>({...f,icon:e.target.value}))} style={inp}/>
        </div>
        <div style={{marginBottom:22}}>
          <Label text="Color"/>
          <input type="color" value={catForm.color} onChange={e=>setCatForm(f=>({...f,color:e.target.value}))}
            style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/>
        </div>
        <button onClick={doAddCat} disabled={!catForm.label}
          style={{display:"block",width:"100%",background:!catForm.label?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!catForm.label?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Save Category"}
        </button>
      </Sheet>

      {/* ── Goal Sheet ── */}
      <Sheet open={modal==="goal"} onClose={closeM} title={editId?"Edit Goal":"New Savings Goal"} T={T}>
        <div style={{marginBottom:14}}>
          <Label text="Goal Name"/>
          <input type="text" placeholder="e.g. Trip home, New laptop…"
            value={goalForm.name} onChange={e=>setGoalForm(f=>({...f,name:e.target.value}))} style={inp}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Label text="Target (€)"/>
            <input type="number" step="1" min="0" placeholder="400"
              value={goalForm.targetAmount} onChange={e=>setGoalForm(f=>({...f,targetAmount:e.target.value}))} style={inp}/>
          </div>
          <div>
            <Label text="Saved so far (€)"/>
            <input type="number" step="1" min="0" placeholder="0"
              value={goalForm.savedAmount} onChange={e=>setGoalForm(f=>({...f,savedAmount:e.target.value}))} style={inp}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <Label text="Icon"/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {GOAL_ICONS.map(ic=>(
              <button key={ic} onClick={()=>setGoalForm(f=>({...f,icon:ic}))}
                style={{width:44,height:44,borderRadius:12,border:`2px solid ${goalForm.icon===ic?T.acc:T.border}`,background:goalForm.icon===ic?T.acc+"18":"transparent",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {ic}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:22}}>
          <Label text="Color"/>
          <input type="color" value={goalForm.color} onChange={e=>setGoalForm(f=>({...f,color:e.target.value}))}
            style={{width:"100%",height:52,border:`1.5px solid ${T.inpB}`,borderRadius:13,background:T.inp,cursor:"pointer",padding:4,display:"block"}}/>
        </div>
        <button onClick={doAddGoal} disabled={!goalForm.name||!goalForm.targetAmount}
          style={{display:"block",width:"100%",background:!goalForm.name||!goalForm.targetAmount?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!goalForm.name||!goalForm.targetAmount?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Create Goal"}
        </button>
      </Sheet>

      {/* ── Recurring Sheet ── */}
      <Sheet open={modal==="rec"} onClose={closeM} title={editId?"Edit Recurring":"New Recurring Transaction"} T={T}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["expense","💸 Expense"],["income","💰 Income"]].map(([v,l])=>(
            <button key={v} onClick={()=>setRecForm(f=>({...f,type:v}))}
              style={{flex:1,padding:"11px 4px",borderRadius:13,border:`2px solid ${recForm.type===v?T.acc:T.border}`,background:recForm.type===v?T.acc:"transparent",color:recForm.type===v?"#fff":T.txt2,fontWeight:600,fontSize:14,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Label text="Amount (€)"/>
            <input type="number" step="0.01" min="0" placeholder="0.00"
              value={recForm.amount} onChange={e=>setRecForm(f=>({...f,amount:e.target.value}))} style={inp}/>
          </div>
          <div>
            <Label text="Day of month"/>
            <input type="number" min="1" max="31" placeholder="1"
              value={recForm.dayOfMonth} onChange={e=>setRecForm(f=>({...f,dayOfMonth:e.target.value}))} style={inp}/>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <Label text="Merchant / Name"/>
          <input type="text" placeholder="e.g. Apple Music, Rent…"
            value={recForm.merchant} onChange={e=>setRecForm(f=>({...f,merchant:e.target.value}))} style={inp}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <Label text="Account"/>
            <select value={recForm.accountId} onChange={e=>setRecForm(f=>({...f,accountId:e.target.value}))} style={inp}>
              <option value="">Select…</option>
              {accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div>
            <Label text="Category"/>
            <select value={recForm.category} onChange={e=>setRecForm(f=>({...f,category:e.target.value}))} style={inp}>
              {cats.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <Label text="Notes (optional)"/>
          <input type="text" placeholder="Any notes…"
            value={recForm.notes} onChange={e=>setRecForm(f=>({...f,notes:e.target.value}))} style={inp}/>
        </div>
        <button onClick={doAddRec} disabled={!recForm.merchant||!recForm.amount||!recForm.accountId}
          style={{display:"block",width:"100%",background:!recForm.merchant||!recForm.amount||!recForm.accountId?T.txt3:T.acc,color:"#fff",border:"none",borderRadius:15,padding:17,fontWeight:700,fontSize:17,cursor:!recForm.merchant||!recForm.amount||!recForm.accountId?"not-allowed":"pointer",marginBottom:4}}>
          {editId?"Save Changes":"Save Recurring"}
        </button>
      </Sheet>

      {/* ── Settings Sheet ── */}
      <Sheet open={modal==="settings"} onClose={closeM} title="Settings & Data" T={T}>
        <input type="file" ref={fileRef} accept=".json" style={{display:"none"}} onChange={doImport}/>
        <div style={{marginBottom:10}}>
          <Label text="Data Backup"/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          <button onClick={doExport}
            style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.download(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Export backup</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Download all data as JSON</div>
            </div>
          </button>
          <button onClick={()=>fileRef.current?.click()}
            style={{display:"flex",alignItems:"center",gap:12,background:T.bg,border:`1.5px solid ${T.border}`,borderRadius:14,padding:"15px 16px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:T.green+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.upload(T.green)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:T.txt}}>Restore backup</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:1}}>Import a JSON backup file</div>
            </div>
          </button>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={()=>{setTab('accs');closeM();}}
            style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.wallet(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:T.txt}}>Manage Accounts</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:2}}>Add, edit or remove bank accounts</div>
            </div>
          </button>
          <button onClick={()=>{setTab('categories');closeM();}}
            style={{flex:1,display:"flex",alignItems:"center",gap:10,background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.acc+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.goal(T.acc)}</div>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:T.txt}}>Manage Categories</div>
              <div style={{fontSize:12,color:T.txt2,marginTop:2}}>Create or remove expense categories</div>
            </div>
          </button>
        </div>
        <div style={{marginBottom:10}}>
          <Label text="Stats"/>
        </div>
        <div style={{background:T.bg,borderRadius:14,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {[["Transactions",txs.length],["Accounts",accs.length],["Goals",goals.length],["Recurring",recurring.length]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:14,color:T.txt2}}>{l}</span>
              <span style={{fontSize:14,fontWeight:600,color:T.txt}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:16,padding:"12px 16px",background:dark?"#2d0000":"#ffdede",borderRadius:14}}>
          <div style={{fontWeight:600,fontSize:14,color:dark?"#ff453a":"#c0392b",marginBottom:4}}>⚠️ Danger zone</div>
          <div style={{fontSize:12,color:dark?"#ff6b6b":"#7f1d1d",marginBottom:10}}>This will permanently delete all your data.</div>
          <button onClick={()=>{if(confirm("Delete ALL data? This cannot be undone.")){sa(DEFACCS);st([]);sg([]);sr([]);closeM();showToast("All data cleared",false);}}}
            style={{background:dark?"#ff453a":"#c0392b",color:"#fff",border:"none",borderRadius:11,padding:"10px 16px",fontWeight:600,fontSize:14,cursor:"pointer"}}>
            Clear all data
          </button>
        </div>
        <div style={{height:16}}/>
      </Sheet>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
